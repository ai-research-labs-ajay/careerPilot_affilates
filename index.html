function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;if(h>0)return `${h}h ${m}m`;return `${m}m ${sc}s`;}
function today(){return new Date().toISOString().split('T')[0];}
function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function stars(n){return '★'.repeat(Math.floor(n))+'☆'.repeat(5-Math.floor(n));}

// ─── GROQ API ─────────────────────────────────────────────────────────────────
async function groqCall(apiKey,prompt){
  if(!apiKey||apiKey.trim()===''){throw new Error('No API key. Please add your Groq key in Settings.');}
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey.trim()}`},
    body:JSON.stringify({
      model:'llama-3.3-70b-versatile',  // Latest stable free model on Groq
      messages:[{role:'user',content:prompt}],
      max_tokens:1800,
      temperature:0.7
    })
  });
  if(!r.ok){
    const errData=await r.json().catch(()=>({}));
    const msg=errData?.error?.message||`API Error ${r.status}`;
    throw new Error(msg);
  }
  const d=await r.json();
  return d.choices[0].message.content;
}

// ─── AUTH PAGE ────────────────────────────────────────────────────────────────
function AuthPage({mode,onDone,onSwitch}){
  const [form,setForm]=useState({name:'',email:'',password:'',confirm:''});
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  const handle=async()=>{
    setErr('');setLoading(true);

    // ── SUPABASE PATH ──
    if(supabase){
      try{
        if(mode==='signup'){
          if(!form.name||!form.email||!form.password){setErr('Please fill all fields.');setLoading(false);return;}
          if(form.password!==form.confirm){setErr('Passwords do not match.');setLoading(false);return;}
          if(form.password.length<6){setErr('Password must be at least 6 characters.');setLoading(false);return;}

          const {data,error}=await supabase.auth.signUp({
            email:form.email.trim().toLowerCase(),
            password:form.password,
            options:{data:{name:form.name.trim()},emailRedirectTo:window.location.href}
          });

          if(error){
            // Handle common errors with friendly messages
            if(error.message.includes('already registered')) setErr('This email is already registered. Please sign in instead.');
            else if(error.message.includes('invalid')) setErr('Please enter a valid email address.');
            else throw error;
            setLoading(false); return;
          }

          // Check if email confirmation is required
          if(data?.user && !data.session){
            // Email confirmation mode — save to DB optimistically
            const {error:upErr1}=await supabase.from('user_profiles').upsert({
              id:data.user.id, name:form.name.trim(),
              email:form.email.trim().toLowerCase(),
              created_at:new Date().toISOString()
            },{onConflict:'id',ignoreDuplicates:false});
            if(upErr1) console.warn('⚠️ Signup profile save failed:',upErr1.message);
            else console.log('✅ user_profiles saved (email confirmation pending) for',form.email);
            await notifyAdmin(form.name.trim(), form.email.trim().toLowerCase());
            setLoading(false);
            setErr('');
            // Show verification message in place of error
            alert(`✅ Account created!\n\n📧 Please check your inbox at ${form.email} and click the verification link, then come back and Sign In.\n\n(Tip: Also check your spam folder)`);
            onSwitch(); // Switch to login mode
            return;
          }

          // No email confirmation needed (already logged in)
          if(data?.user && data.session){
            const {error:upErr2}=await supabase.from('user_profiles').upsert({
              id:data.user.id, name:form.name.trim(),
              email:form.email.trim().toLowerCase(),
              created_at:new Date().toISOString()
            },{onConflict:'id',ignoreDuplicates:false});
            if(upErr2) console.warn('⚠️ Signup profile save failed:',upErr2.message);
            else console.log('✅ user_profiles saved for',form.email);
            await notifyAdmin(form.name.trim(), form.email.trim().toLowerCase());
            const userObj={name:form.name.trim(),email:form.email.trim().toLowerCase(),id:data.user.id};
            ss('bs_current_user',userObj);
            setLoading(false);
            onDone(userObj);
          }

        }else{
          // LOGIN
          const {data,error}=await supabase.auth.signInWithPassword({
            email:form.email.trim().toLowerCase(),
            password:form.password
          });
          if(error){
            if(error.message.includes('Email not confirmed'))
              setErr('Please verify your email first. Check your inbox for the verification link.');
            else if(error.message.includes('Invalid login'))
              setErr('Wrong email or password. Please try again.');
            else throw error;
            setLoading(false); return;
          }
          const name=data.user.user_metadata?.name||form.email.split('@')[0];
          // Always upsert on login — catches users who signed up via email confirmation
          const {error:upErr}=await supabase.from('user_profiles').upsert({
            id:data.user.id,
            name,
            email:data.user.email,
            created_at:new Date().toISOString()
          },{onConflict:'id',ignoreDuplicates:false});
          if(upErr) console.warn('⚠️ Profile upsert on login failed:',upErr.message);
          else console.log('✅ user_profiles saved for',data.user.email);
          // Notify admin only on truly new users (no existing row)
          const {data:existing}=await supabase.from('user_profiles').select('created_at').eq('id',data.user.id).single();
          const isNewUser=!existing||Math.abs(new Date()-new Date(existing.created_at))<60000;
          if(isNewUser) await notifyAdmin(name, data.user.email);
          const userObj={name,email:data.user.email,id:data.user.id};
          ss('bs_current_user',userObj);
          setLoading(false);
          onDone(userObj);
        }
      }catch(e){
        console.error('Auth error:',e);
        setErr(e.message||'Something went wrong. Please try again.');
        setLoading(false);
      }
      return;
    }

    // ── LOCALSTORAGE FALLBACK (when Supabase not configured yet) ──
    await new Promise(r=>setTimeout(r,500));
    if(mode==='signup'){
      if(!form.name||!form.email||!form.password){setErr('Please fill all fields.');setLoading(false);return;}
      if(form.password!==form.confirm){setErr('Passwords do not match.');setLoading(false);return;}
      const users=ls('bs_users',[]);
      if(users.find(u=>u.email===form.email)){setErr('Email already registered.');setLoading(false);return;}
      users.push({name:form.name,email:form.email});
      ss('bs_users',users);
      ss('bs_current_user',{name:form.name,email:form.email});
      onDone({name:form.name,email:form.email});
    }else{
      const users=ls('bs_users',[]);
      const u=users.find(u=>u.email===form.email);
      if(!u){setErr('Email not found. Please sign up first.');setLoading(false);return;}
      ss('bs_current_user',{name:u.name,email:u.email});
      onDone({name:u.name,email:u.email});
    }
    setLoading(false);
  };

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#0f0c29,#302b63,#24243e)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div className="glass" style={{borderRadius:20,padding:40,width:'100%',maxWidth:420}}>
        <div style={{textAlign:'center',marginBottom:30}}>
          <div style={{fontSize:36,marginBottom:8}}>⚡</div>
          <h2 style={{color:'#fff',fontWeight:800,fontSize:24}}>{mode==='signup'?'Create Account':'Welcome Back'}</h2>
          <p style={{color:'#64748b',fontSize:13,marginTop:6}}>{mode==='signup'?'Join thousands of students on CareerPilot':'Continue your study journey'}</p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {mode==='signup'&&<input className="input" placeholder="Full Name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>}
          <input className="input" placeholder="Email Address" type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
          <input className="input" placeholder="Password" type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})}/>
          {mode==='signup'&&<input className="input" placeholder="Confirm Password" type="password" value={form.confirm} onChange={e=>setForm({...form,confirm:e.target.value})}/>}
          {err&&<div style={{color:'#fca5a5',fontSize:13,textAlign:'center'}}>{err}</div>}
          <button className="btn-primary" style={{marginTop:6}} onClick={handle} disabled={loading}>
            {loading?'Please wait…':mode==='signup'?'Create Account':'Sign In'}
          </button>
        </div>
        <p style={{color:'#64748b',textAlign:'center',marginTop:20,fontSize:13}}>
          {mode==='signup'?'Already have an account? ':'New here? '}
          <span style={{color:'#a78bfa',cursor:'pointer'}} onClick={onSwitch}>{mode==='signup'?'Sign In':'Create Account'}</span>
        </p>
      </div>
    </div>
  );
}

// ─── TASK MANAGER ─────────────────────────────────────────────────────────────
function TaskManager({tasks,setTasks,profile}){
  const [newTask,setNewTask]=useState('');
  const [newType,setNewType]=useState('topic');
  const [newSubject,setNewSubject]=useState('');
  const [filter,setFilter]=useState('all');

  const topics=profile?(TOPICS_BY_EXAM[profile.targetExam]||TOPICS_BY_EXAM['GATE (CSE)']):TOPICS_BY_EXAM['GATE (CSE)'];

  // Auto-seed tasks from exam topics if empty
  useEffect(()=>{
    if(tasks.length===0&&profile){
      const seed=[];
      topics.forEach(subj=>{
        subj.subtopics.slice(0,3).forEach(sub=>{
          seed.push({id:Date.now()+Math.random(),text:sub,subject:subj.subject,type:'topic',done:false,addedAt:new Date().toISOString()});
        });
      });
      setTasks(seed);
    }
  },[profile]);

  const addTask=()=>{
    if(!newTask.trim())return;
    const t={id:Date.now(),text:newTask.trim(),subject:newSubject||'General',type:newType,done:false,addedAt:new Date().toISOString()};
    const updated=[...tasks,t];
    setTasks(updated);
    ss('bs_tasks',updated);
    setNewTask('');
  };

  const toggle=(id)=>{
    const updated=tasks.map(t=>t.id===id?{...t,done:!t.done,doneAt:!t.done?new Date().toISOString():null}:t);
    setTasks(updated);
    ss('bs_tasks',updated);
  };

  const remove=(id)=>{
    const updated=tasks.filter(t=>t.id!==id);
    setTasks(updated);
    ss('bs_tasks',updated);
  };

  const filtered=tasks.filter(t=>{
    if(filter==='all')return true;
    if(filter==='done')return t.done;
    if(filter==='pending')return !t.done;
    if(filter==='topic')return t.type==='topic';
    if(filter==='video')return t.type==='video';
    return true;
  });

  const done=tasks.filter(t=>t.done).length;
  const pct=tasks.length?Math.round(done/tasks.length*100):0;

  return(
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <h2 style={{color:'#fff',fontSize:22,fontWeight:800}}>✅ Task Manager</h2>
          <p style={{color:'#64748b',fontSize:13,marginTop:4}}>{done}/{tasks.length} completed ({pct}%)</p>
        </div>
      </div>

      {/* Progress */}
      <div className="card" style={{marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
          <span style={{color:'#e2e8f0',fontSize:14}}>Overall Progress</span>
          <span style={{color:'#10b981',fontWeight:700}}>{pct}%</span>
        </div>
        <div className="progress-bar" style={{height:10}}><div className="progress-fill" style={{width:pct+'%'}}/></div>
      </div>

      {/* Add task */}
      <div className="card" style={{marginBottom:20}}>
        <h4 style={{color:'#a5b4fc',fontSize:13,fontWeight:700,marginBottom:12}}>+ ADD NEW TASK</h4>
        <div style={{display:'grid',gridTemplateColumns:'1fr auto auto',gap:10,alignItems:'end'}}>
          <input className="input" placeholder="Task description…" value={newTask} onChange={e=>setNewTask(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addTask()}/>
          <select className="select" value={newType} onChange={e=>setNewType(e.target.value)} style={{width:110}}>
            <option value="topic">📖 Topic</option>
            <option value="video">▶️ Video</option>
            <option value="practice">✏️ Practice</option>
            <option value="revision">🔄 Revision</option>
          </select>
          <button className="btn-primary" onClick={addTask}>Add</button>
        </div>
        <input className="input" placeholder="Subject (optional)" value={newSubject} onChange={e=>setNewSubject(e.target.value)} style={{marginTop:10}}/>
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        {['all','pending','done','topic','video'].map(f=>(
          <button key={f} className={`tab-btn${filter===f?' active':''}`} onClick={()=>setFilter(f)}>
            {f.charAt(0).toUpperCase()+f.slice(1)} {f==='all'?`(${tasks.length})`:f==='done'?`(${done})`:f==='pending'?`(${tasks.length-done})`:''}
          </button>
        ))}
      </div>

      {/* Task list */}
      <div>
        {filtered.length===0&&<div style={{textAlign:'center',color:'#475569',padding:40}}>No tasks here yet. Add one above!</div>}
        {filtered.map(t=>(
          <div key={t.id} className={`task-item${t.done?' done':''}`}>
            <input type="checkbox" checked={t.done} onChange={()=>toggle(t.id)}
              style={{width:18,height:18,cursor:'pointer',accentColor:'#8b5cf6',flexShrink:0,marginTop:2}}/>
            <div style={{flex:1}}>
              <span className="task-text" style={{color:'#e2e8f0',fontSize:14}}>{t.text}</span>
              <div style={{display:'flex',gap:8,marginTop:6,flexWrap:'wrap'}}>
                <span className="badge badge-purple">{t.subject}</span>
                <span className={`badge ${t.type==='video'?'badge-blue':t.type==='practice'?'badge-green':'badge-purple'}`}>
                  {t.type==='video'?'▶️ Video':t.type==='practice'?'✏️ Practice':t.type==='revision'?'🔄 Revision':'📖 Topic'}
                </span>
                {t.done&&t.doneAt&&<span className="badge badge-green">✓ Done</span>}
              </div>
            </div>
            <button onClick={()=>remove(t.id)} style={{background:'transparent',border:'none',color:'#475569',cursor:'pointer',fontSize:18,padding:'0 4px'}}>×</button>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── JOB FINDER ───────────────────────────────────────────────────────────────
function JobFinder(){
  const [query,setQuery]=useState('');
  const [location,setLocation]=useState('India');
  const [liveResults,setLiveResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [liveError,setLiveError]=useState('');
  const [searched,setSearched]=useState(false);
  const [rapidKey,setRapidKey]=useState(ls('cp_rapidapi_key',''));
  const [showKeyInput,setShowKeyInput]=useState(false);
  const [activeTab,setActiveTab]=useState('live'); // live | curated
  // curated filter state
  const [search,setSearch]=useState('');
  const [typeFilter,setTypeFilter]=useState('All');
  const [catFilter,setCatFilter]=useState('All');
  const categories=['All',...new Set(JOBS.map(j=>j.category))];

  const saveKey=(k)=>{setRapidKey(k);ss('cp_rapidapi_key',k);setShowKeyInput(false);};

  const fetchJobs=async()=>{
    if(!query.trim()){alert('Please enter a job title to search.');return;}
    if(!rapidKey.trim()){setShowKeyInput(true);return;}
    setLoading(true);setLiveError('');setLiveResults([]);setSearched(true);
    try{
      const q=encodeURIComponent(`${query.trim()} ${location.trim()||'India'}`);
      const res=await fetch(
        `https://jsearch.p.rapidapi.com/search?query=${q}&page=1&num_pages=2&country=in&date_posted=all`,
        {method:'GET',headers:{'X-RapidAPI-Key':rapidKey.trim(),'X-RapidAPI-Host':'jsearch.p.rapidapi.com'}}
      );
      if(!res.ok){
        const e=await res.json().catch(()=>({}));
        throw new Error(e?.message||`API Error ${res.status}`);
      }
      const data=await res.json();
      if(!data.data||data.data.length===0){setLiveError('No jobs found for this search. Try a different title or location.');setLoading(false);return;}
      setLiveResults(data.data);
    }catch(e){
      if(e.message.includes('401')||e.message.includes('403'))
        setLiveError('Invalid API key. Please check your RapidAPI key in the input below.');
      else setLiveError('Search failed: '+e.message);
    }
    setLoading(false);
  };

  const fmtSalary=(min,max,currency,period)=>{
    if(!min&&!max)return null;
    const fmt=(n)=>{
      if(currency==='INR'){const l=Math.round(n/100000);return l+'L';}
      return '$'+Math.round(n/1000)+'K';
    };
    const p=period==='YEAR'?'/yr':period==='MONTH'?'/mo':'';
    if(min&&max)return `${fmt(min)}–${fmt(max)}${p}`;
    if(min)return `${fmt(min)}+${p}`;
    return null;
  };

  const fmtDate=(iso)=>{
    if(!iso)return '';
    const d=new Date(iso),now=new Date();
    const diff=Math.floor((now-d)/86400000);
    if(diff===0)return 'Today';
    if(diff===1)return 'Yesterday';
    if(diff<7)return `${diff} days ago`;
    if(diff<30)return `${Math.floor(diff/7)} weeks ago`;
    return `${Math.floor(diff/30)} months ago`;
  };

  const empTypeBadge=(t)=>{
    const map={FULLTIME:'Full-time',PARTTIME:'Part-time',CONTRACTOR:'Contract',INTERN:'Internship'};
    return map[t]||t||'';
  };

  const curatedFiltered=JOBS.filter(j=>{
    const q=search.toLowerCase();
    const matchS=j.title.toLowerCase().includes(q)||j.company.toLowerCase().includes(q)||j.skills.some(s=>s.toLowerCase().includes(q));
    return matchS&&(typeFilter==='All'||j.type===typeFilter)&&(catFilter==='All'||j.category===catFilter);
  });

  return(
    <div className="fade-in">
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
        <div>
          <h2 style={{color:'#fff',fontSize:22,fontWeight:800}}>💼 Job Finder</h2>
          <p style={{color:'#64748b',fontSize:13,marginTop:4}}>Search real jobs from LinkedIn, Indeed, Naukri & more</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          {[['live','🔴 Live Search'],['curated','📋 Curated Jobs']].map(([v,l])=>(
            <button key={v} className={`tab-btn${activeTab===v?' active':''}`} onClick={()=>setActiveTab(v)}>{l}</button>
          ))}
        </div>
      </div>

      {/* ══ LIVE SEARCH TAB ══ */}
      {activeTab==='live'&&(
        <div>
          {/* API key setup banner */}
          {(!rapidKey||showKeyInput)&&(
            <div style={{background:'rgba(245,158,11,0.08)',border:'1px solid rgba(245,158,11,0.25)',borderRadius:14,padding:18,marginBottom:20}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div>
                  <span style={{color:'#fcd34d',fontWeight:700,fontSize:14}}>🔑 RapidAPI Key Required for Live Search</span>
                  <p style={{color:'#94a3b8',fontSize:12,marginTop:4}}>
                    Get a <strong style={{color:'#fcd34d'}}>free key</strong> at{' '}
                    <a href="https://rapidapi.com/letscrape-6bRBa3QguO5/api/jsearch" target="_blank" style={{color:'#818cf8',textDecoration:'underline'}}>
                      rapidapi.com → JSearch API
                    </a>
                    {' '}→ Subscribe to Free plan (200 req/month) → copy your key
                  </p>
                </div>
                {rapidKey&&<button onClick={()=>setShowKeyInput(false)} style={{background:'transparent',border:'none',color:'#475569',cursor:'pointer',fontSize:18}}>×</button>}
              </div>
              <div style={{display:'flex',gap:10}}>
                <input className="input" placeholder="Paste your RapidAPI key here…" defaultValue={rapidKey}
                  id="rapidKeyInput" style={{flex:1}}/>
                <button className="btn-primary" onClick={()=>{const k=document.getElementById('rapidKeyInput').value;saveKey(k);}}>
                  Save & Search
                </button>
              </div>
            </div>
          )}

          {/* Search bar */}
          <div style={{display:'grid',gridTemplateColumns:'1fr auto auto',gap:10,marginBottom:16,alignItems:'center'}}>
            <input className="input" placeholder="Job title, role or skill (e.g. Software Engineer, Data Analyst, GATE)…"
              value={query} onChange={e=>setQuery(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&fetchJobs()}
              style={{fontSize:15}}/>
            <input className="input" placeholder="📍 Location" value={location}

function StudyVideos({tasks,setTasks}){
  const [filter,setFilter]=useState('All');

  const exams=['All',...new Set(VIDEOS.map(v=>v.exam))];

  const toggleWatch=(id,title)=>{
    let newWatched;
    if(watched.includes(id)){newWatched=watched.filter(w=>w!==id);}
    else{
      newWatched=[...watched,id];
      // add to tasks
      const exists=tasks.find(t=>t.text.includes(title.substring(0,30)));
      if(!exists){
        const t={id:Date.now(),text:`Watch: ${title}`,subject:'Videos',type:'video',done:true,addedAt:new Date().toISOString(),doneAt:new Date().toISOString()};
        const updated=[...tasks,t];
        setTasks(updated);
        ss('bs_tasks',updated);
      }

    setWatched(newWatched);
    ss('bs_watched_videos',newWatched);

  const videos=VIDEOS.filter(v=>filter==='All'||v.exam===filter);

  return(
    <div className="fade-in">

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:16}}>

            </div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>

            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn-primary" style={{flex:1,fontSize:12,padding:'7px 0'}}

// ─── PERFORMANCE DASHBOARD ────────────────────────────────────────────────────
function PerformanceDashboard({tasks,timerSecs}){
  const dailyTimes=ls('bs_daily_times',{});
  const streak=ls('bs_streak',0);
  const done=tasks.filter(t=>t.done).length;
  const total=tasks.length;
  const bySubject={};
  tasks.forEach(t=>{
    if(!bySubject[t.subject])bySubject[t.subject]={done:0,total:0};
    bySubject[t.subject].total++;
    if(t.done)bySubject[t.subject].done++;
  });

  // Last 7 days
  const last7=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-i);
    const key=d.toISOString().split('T')[0];
    const label=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    return{label,mins:Math.round((dailyTimes[key]||0)/60),key};
  }).reverse();

  const maxMins=Math.max(...last7.map(d=>d.mins),1);

  return(
    <div className="fade-in">
      <div style={{marginBottom:24}}>
        <h2 style={{color:'#fff',fontSize:22,fontWeight:800}}>📊 Performance Dashboard</h2>
        <p style={{color:'#64748b',fontSize:13,marginTop:4}}>Your study analytics and progress overview</p>
      </div>

      {/* Stats row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:16,marginBottom:24}}>
        {[
          {label:'Today',value:fmtTime(timerSecs),icon:'⏱',color:'#6366f1'},
          {label:'Streak',value:streak+' days 🔥',icon:'',color:'#f59e0b'},
          {label:'Tasks Done',value:`${done}/${total}`,icon:'✅',color:'#10b981'},
          {label:'Videos Done',value:ls('bs_watched_videos',[]).length,icon:'▶️',color:'#8b5cf6'},
        ].map(s=>(
          <div key={s.label} className="card" style={{textAlign:'center'}}>
            <div style={{color:s.color,fontSize:22,fontWeight:800,marginBottom:4}}>{s.value}</div>
            <div style={{color:'#64748b',fontSize:12}}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20,marginBottom:20}}>
        {/* Study time chart */}
        <div className="card">
          <h4 style={{color:'#a5b4fc',fontWeight:700,marginBottom:20,fontSize:13}}>📅 STUDY TIME – LAST 7 DAYS</h4>
          <div style={{display:'flex',gap:8,alignItems:'flex-end',height:120}}>
            {last7.map(d=>(
              <div key={d.key} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
                <span style={{color:'#475569',fontSize:11}}>{d.mins}m</span>
                <div style={{width:'100%',background:'linear-gradient(180deg,#8b5cf6,#6366f1)',borderRadius:'4px 4px 0 0',
                  height:Math.max(4,Math.round(d.mins/maxMins*90))+'px',minHeight:4,
                  opacity:d.key===today()?1:0.5,
                  boxShadow:d.key===today()?'0 0 12px rgba(139,92,246,0.5)':'none'}}/>

}

                  </div>
                  <div>
                    <h4 style={{color:'#e2e8f0',fontWeight:700,fontSize:13,lineHeight:1.4}}>{n.title}</h4>
                    <p style={{color:'#64748b',fontSize:11,marginTop:3}}>{n.uploadedBy}</p>
                  </div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  {n.type==='free'
                    ?<span className="badge badge-green">FREE</span>
                    :isUnlocked
                      ?<span className="badge badge-green">UNLOCKED</span>
                      :<span style={{background:'linear-gradient(135deg,#f59e0b,#d97706)',color:'#fff',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700}}>₹{n.price}</span>
                  }
                </div>
              </div>

              {/* Tags */}
              <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:10}}>
                {n.tags.slice(0,4).map(t=>(
                  <span key={t} style={{background:'rgba(99,102,241,0.12)',color:'#a5b4fc',padding:'2px 8px',borderRadius:20,fontSize:10}}>{t}</span>
                ))}
              </div>

              {/* Preview */}
              <p style={{color:'#64748b',fontSize:12,lineHeight:1.5,marginBottom:12}}>{n.preview.substring(0,110)}…</p>

              {/* Meta */}
              <div style={{display:'flex',gap:12,marginBottom:14,flexWrap:'wrap'}}>
                <span style={{color:'#475569',fontSize:11}}>📄 {n.pages} pages</span>
                <span style={{color:'#475569',fontSize:11}}>💾 {n.size}</span>
                <span style={{color:'#475569',fontSize:11}}>⬇️ {n.downloads.toLocaleString()} downloads</span>
                <span style={{color:'#fbbf24',fontSize:11}}>★ {n.rating}</span>
              </div>

              {/* Exam badge */}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span className="badge badge-purple">{n.exam}</span>
                <button onClick={()=>handleUnlock(n)} style={{
                  padding:'8px 16px',borderRadius:8,border:'none',cursor:'pointer',fontSize:12,fontWeight:700,
                  background:isUnlocked?'linear-gradient(135deg,#10b981,#059669)':'linear-gradient(135deg,#6366f1,#8b5cf6)',
                  color:'#fff',display:'flex',alignItems:'center',gap:6}}>
                  {isUnlocked?'⬇️ Download PDF':'🔓 Unlock & Download'}
                </button>
              </div>
            </div>
          );
        })}
        {filtered.length===0&&<div style={{color:'#475569',gridColumn:'1/-1',textAlign:'center',padding:40}}>No notes found matching your filters.</div>}
      </div>}

      {/* ── UPLOAD TAB ── */}
      {tab==='upload'&&(
        <div>
          {uploadDone?(
            <div style={{textAlign:'center',padding:'40px 20px'}}>
              <div style={{fontSize:56,marginBottom:16}}>🎉</div>
              <h3 style={{color:'#6ee7b7',fontWeight:800,fontSize:22,marginBottom:8}}>PDF Submitted!</h3>
              <p style={{color:'#94a3b8',fontSize:14,marginBottom:20}}>Your notes have been received. After review (24–48 hrs) they'll appear in the library.</p>
              <button className="btn-primary" onClick={()=>{setUploadDone(false);setUploadForm({title:'',subject:'',exam:'GATE (CSE)',desc:'',type:'free',price:'',uploaderName:'',uploaderEmail:''});setUploadFile(null);}}>Upload Another</button>
            </div>
          ):(
            <div style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:24}}>
              <div className="card">
                <h4 style={{color:'#a5b4fc',fontWeight:700,fontSize:13,marginBottom:16}}>📤 UPLOAD YOUR PDF NOTES</h4>

                <div style={{display:'flex',flexDirection:'column',gap:14}}>
                  <div>
                    <label style={{color:'#94a3b8',fontSize:12,display:'block',marginBottom:5}}>Notes Title *</label>
                    <input className="input" placeholder="e.g. GATE CSE – OS Complete Notes" value={uploadForm.title} onChange={e=>setUploadForm({...uploadForm,title:e.target.value})}/>
                  </div>
                  <div className="two-col" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                    <div>
                      <label style={{color:'#94a3b8',fontSize:12,display:'block',marginBottom:5}}>Subject *</label>
                      <input className="input" placeholder="e.g. Operating Systems" value={uploadForm.subject} onChange={e=>setUploadForm({...uploadForm,subject:e.target.value})}/>
                    </div>
                    <div>
                      <label style={{color:'#94a3b8',fontSize:12,display:'block',marginBottom:5}}>Exam</label>
                      <select className="select" value={uploadForm.exam} onChange={e=>setUploadForm({...uploadForm,exam:e.target.value})}>
                        {EXAMS.map(ex=><option key={ex}>{ex}</option>)}
                        <option>B.Tech General</option>
                        <option>Campus Placement</option>
                      </select>
                    </div>
                  </div>
                  <div>
                    <label style={{color:'#94a3b8',fontSize:12,display:'block',marginBottom:5}}>Short Description *</label>
                    <textarea className="input" placeholder="What topics does this PDF cover? Why is it useful?" value={uploadForm.desc} onChange={e=>setUploadForm({...uploadForm,desc:e.target.value})} style={{resize:'vertical',minHeight:80}}/>
                  </div>
                  <div className="two-col" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                    <div>
                      <label style={{color:'#94a3b8',fontSize:12,display:'block',marginBottom:5}}>Note Type</label>
                      <select className="select" value={uploadForm.type} onChange={e=>setUploadForm({...uploadForm,type:e.target.value})}>
                        <option value="free">🆓 Free (everyone can download)</option>
                        <option value="premium">⭐ Paid (students pay to download)</option>
                      </select>
                    </div>
                    <div>
                      <label style={{color:'#94a3b8',fontSize:12,display:'block',marginBottom:5}}>
                        Price (₹) {uploadForm.type==='free'&&<span style={{color:'#475569'}}>(not needed for free)</span>}
                      </label>
                      <input className="input" placeholder="e.g. 99" type="number" min="9" disabled={uploadForm.type==='free'} value={uploadForm.price} onChange={e=>setUploadForm({...uploadForm,price:e.target.value})} style={{opacity:uploadForm.type==='free'?0.4:1}}/>
                    </div>
                  </div>
                  <div className="two-col" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                    <div>
                      <label style={{color:'#94a3b8',fontSize:12,display:'block',marginBottom:5}}>Your Name *</label>
                      <input className="input" placeholder="Your full name" value={uploadForm.uploaderName} onChange={e=>setUploadForm({...uploadForm,uploaderName:e.target.value})}/>
                    </div>
                    <div>
                      <label style={{color:'#94a3b8',fontSize:12,display:'block',marginBottom:5}}>Your Email *</label>
                      <input className="input" placeholder="For payment & updates" type="email" value={uploadForm.uploaderEmail} onChange={e=>setUploadForm({...uploadForm,uploaderEmail:e.target.value})}/>
                    </div>
                  </div>

                  {/* File drop zone */}
                  <div onClick={()=>fileRef.current.click()} style={{border:`2px dashed ${uploadFile?'#10b981':'rgba(99,102,241,0.4)'}`,borderRadius:12,padding:'28px',textAlign:'center',cursor:'pointer',background:uploadFile?'rgba(16,185,129,0.05)':'rgba(99,102,241,0.05)',transition:'all .2s'}}>
                    <input ref={fileRef} type="file" accept=".pdf" style={{display:'none'}} onChange={e=>setUploadFile(e.target.files[0]||null)}/>
                    <div style={{fontSize:36,marginBottom:8}}>{uploadFile?'✅':'📄'}</div>
                    {uploadFile
                      ?<><div style={{color:'#6ee7b7',fontWeight:700}}>{uploadFile.name}</div><div style={{color:'#475569',fontSize:12,marginTop:4}}>{(uploadFile.size/1024/1024).toFixed(2)} MB · Click to change</div></>
                      :<><div style={{color:'#a5b4fc',fontWeight:600}}>Click or drag to upload PDF</div><div style={{color:'#475569',fontSize:12,marginTop:4}}>PDF only · Max 50 MB</div></>
                    }
                  </div>

                  <button className="btn-primary" disabled={uploadLoading} onClick={async()=>{
                    if(!uploadForm.title||!uploadForm.subject||!uploadForm.desc||!uploadForm.uploaderName||!uploadForm.uploaderEmail){alert('Please fill all required fields.');return;}
                    if(!uploadFile){alert('Please select a PDF file.');return;}
                    if(uploadForm.type==='premium'&&(!uploadForm.price||+uploadForm.price<9)){alert('Please set a price (minimum ₹9) for premium notes.');return;}
                    setUploadLoading(true);

                    // Save to Supabase storage if configured
                    let fileUrl='pending_upload';
                    if(supabase){
                      try{
                        const path=`uploads/${Date.now()}_${uploadFile.name.replace(/\s/g,'_')}`;
                        const {data:fdata,error:ferr}=await supabase.storage.from('notes').upload(path,uploadFile,{cacheControl:'3600',upsert:false});
                        if(!ferr){
                          const {data:url}=supabase.storage.from('notes').getPublicUrl(path);
                          fileUrl=url.publicUrl;
                        }
                        // Save metadata to DB
                        await supabase.from('notes_uploads').insert({
                          title:uploadForm.title, subject:uploadForm.subject, exam:uploadForm.exam,
                          description:uploadForm.desc, type:uploadForm.type,
                          price:uploadForm.type==='premium'?+uploadForm.price:0,
                          file_url:fileUrl, uploader_name:uploadForm.uploaderName,
                          uploader_email:uploadForm.uploaderEmail, status:'pending'
                        });
                      }catch(err){console.warn('Supabase upload error',err);}
                    }

                    // Notify admin via Web3Forms
                    if(WEB3FORMS_KEY!=='YOUR_WEB3FORMS_ACCESS_KEY'){
                      await fetch('https://api.web3forms.com/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
                        access_key:WEB3FORMS_KEY,
                        subject:`📄 New Notes Upload: ${uploadForm.title}`,
                        from_name:'CareerPilot Uploads',
                        to_email:ADMIN_EMAIL,
                        message:`New notes submitted for review!\n\nTitle: ${uploadForm.title}\nSubject: ${uploadForm.subject}\nType: ${uploadForm.type}${uploadForm.type==='premium'?' (₹'+uploadForm.price+')':''}\nUploader: ${uploadForm.uploaderName} (${uploadForm.uploaderEmail})\nFile: ${uploadFile.name}\nFile URL: ${fileUrl}`
                      })}).catch(()=>{});
                    }

                    // Local fallback
                    const upload={id:Date.now(),title:uploadForm.title,subject:uploadForm.subject,exam:uploadForm.exam,type:uploadForm.type,price:+uploadForm.price||0,uploaderName:uploadForm.uploaderName,submittedAt:new Date().toISOString(),status:'pending'};
                    const prev=ls('cp_user_uploads',[]);
                    ss('cp_user_uploads',[...prev,upload]);
                    setUserUploads([...prev,upload]);
                    setUploadLoading(false);
                    setUploadDone(true);
                  }}>
                    {uploadLoading?'Uploading… ⏳':'📤 Submit Notes for Review'}
                  </button>
                </div>
              </div>

              {/* Right panel */}
              <div>
                <div className="card" style={{marginBottom:16}}>
                  <h4 style={{color:'#6ee7b7',fontWeight:700,fontSize:13,marginBottom:12}}>💰 EARN BY UPLOADING</h4>
                  {[['70%','of every paid download goes to you'],['₹9 min','set your own price'],['24–48 hrs','review & publish time'],['Lifetime','earnings on your notes']].map(([v,l])=>(
                    <div key={v} style={{display:'flex',gap:10,padding:'8px 0',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
                      <span style={{color:'#6ee7b7',fontWeight:800,minWidth:60,fontSize:13}}>{v}</span>
                      <span style={{color:'#94a3b8',fontSize:13}}>{l}</span>
                    </div>
                  ))}
                  <div style={{marginTop:12,padding:'10px',background:'rgba(16,185,129,0.08)',borderRadius:8,fontSize:12,color:'#6ee7b7'}}>
                    💳 Earnings paid to your UPI ID every Monday
                  </div>
                </div>

                {/* My submissions */}
                {userUploads.length>0&&(
                  <div className="card">
                    <h4 style={{color:'#a5b4fc',fontWeight:700,fontSize:13,marginBottom:10}}>📋 MY SUBMISSIONS</h4>
                    {userUploads.map(u=>(
                      <div key={u.id} style={{padding:'8px 0',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
                        <div style={{color:'#e2e8f0',fontSize:13,fontWeight:600}}>{u.title}</div>
                        <div style={{display:'flex',gap:8,marginTop:4}}>
                          <span className="badge badge-yellow">{u.status==='pending'?'⏳ Under Review':'✅ Live'}</span>
                          {u.type==='premium'&&<span className="badge badge-green">₹{u.price}</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Info banner */}
      {tab!=='upload'&&(
      <div style={{marginTop:24,background:'rgba(245,158,11,0.08)',border:'1px solid rgba(245,158,11,0.2)',borderRadius:14,padding:18}}>
        <h4 style={{color:'#fcd34d',fontWeight:700,marginBottom:8}}>💡 About Our Notes</h4>
        <p style={{color:'#94a3b8',fontSize:13,lineHeight:1.6}}>
          Free notes are prepared by CareerPilot Team and updated regularly. Premium notes include extra PYQ analysis, mock tests, and in-depth explanations.
          Premium purchases are one-time — you get lifetime access. All payments go directly to the creator who made the notes.
        </p>
      </div>
      )}

      {/* Payment Modal */}
      {payModal&&!payDone&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2000,padding:20}} onClick={e=>e.target===e.currentTarget&&setPayModal(null)}>
          <div className="glass" style={{borderRadius:20,padding:32,width:'100%',maxWidth:440}}>
            <h3 style={{color:'#fff',fontWeight:800,fontSize:20,marginBottom:6}}>🔓 Unlock Premium Notes</h3>
            <p style={{color:'#64748b',fontSize:13,marginBottom:20}}>{payModal.title}</p>

            {payStep===1&&(
              <>
                <div style={{background:'rgba(99,102,241,0.1)',border:'1px solid rgba(99,102,241,0.3)',borderRadius:12,padding:16,marginBottom:20}}>
                  <div style={{color:'#a5b4fc',fontWeight:700,fontSize:16,marginBottom:4}}>Amount: ₹{payModal.price}</div>
                  <div style={{color:'#64748b',fontSize:13}}>One-time payment · Lifetime access · {payModal.pages} pages · {payModal.size}</div>
                </div>
                <div style={{background:'rgba(255,255,255,0.04)',borderRadius:12,padding:16,marginBottom:16,textAlign:'center'}}>
                  <div style={{fontSize:40,marginBottom:8}}>📲</div>
                  <div style={{color:'#e2e8f0',fontWeight:700,marginBottom:4}}>Pay via UPI</div>
                  <div style={{color:'#a78bfa',fontSize:16,fontWeight:800,marginBottom:4}}>7324897718@ptsbi</div>
                  <div style={{color:'#64748b',fontSize:13}}>Or scan QR code in the CareerPilot app</div>
                </div>
                <button className="btn-primary" style={{width:'100%'}} onClick={()=>setPayStep(2)}>I've Made the Payment →</button>
                <button onClick={()=>setPayModal(null)} style={{width:'100%',marginTop:10,background:'transparent',border:'none',color:'#475569',cursor:'pointer',padding:'8px 0'}}>Cancel</button>
              </>
            )}

            {payStep===2&&(
              <>
                <div style={{background:'rgba(16,185,129,0.1)',border:'1px solid rgba(16,185,129,0.2)',borderRadius:10,padding:12,marginBottom:16,color:'#6ee7b7',fontSize:13}}>
                  ✓ Send ₹{payModal.price} to <strong>7324897718@ptsbi</strong> first, then enter details below.
                </div>
                <label style={{color:'#94a3b8',fontSize:12,display:'block',marginBottom:6}}>Your UPI ID</label>
                <input className="input" placeholder="yourname@paytm / @gpay / @upi" value={upiId} onChange={e=>setUpiId(e.target.value)} style={{marginBottom:12}}/>
                <label style={{color:'#94a3b8',fontSize:12,display:'block',marginBottom:6}}>UPI Transaction ID / Reference Number</label>
                <input className="input" placeholder="12-digit transaction ID" value={txnId} onChange={e=>setTxnId(e.target.value)} style={{marginBottom:16}}/>
                <p style={{color:'#475569',fontSize:11,marginBottom:14}}>⏱ Verification takes 5–10 minutes. Notes will auto-unlock on confirmation. (Demo: unlocks instantly)</p>
                <button className="btn-primary" style={{width:'100%'}} onClick={handlePayConfirm}>✅ Confirm & Unlock</button>
                <button onClick={()=>setPayStep(1)} style={{width:'100%',marginTop:10,background:'transparent',border:'none',color:'#64748b',cursor:'pointer',padding:'6px 0'}}>← Back</button>
              </>
            )}
          </div>
        </div>
      )}

      {/* Success modal */}
      {payModal&&payDone&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2000,padding:20}}>
          <div className="glass" style={{borderRadius:20,padding:32,width:'100%',maxWidth:400,textAlign:'center'}}>
            <div style={{fontSize:56,marginBottom:16}}>🎉</div>
            <h3 style={{color:'#6ee7b7',fontWeight:800,fontSize:22,marginBottom:8}}>Notes Unlocked!</h3>
            <p style={{color:'#94a3b8',fontSize:14,marginBottom:20}}>{payModal.title} is now available for download.</p>
            <button className="btn-primary" style={{width:'100%'}} onClick={()=>{setPayModal(null);setPayDone(false);}}>Download Now →</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('landing'); // landing|auth|apikey|profile|app
  const [authMode,setAuthMode]=useState('login');
  const [user,setUser]=useState(ls('bs_current_user',null));
  const [profile,setProfile]=useState(ls('bs_profile',null));
  const [apiKey,setApiKey]=useState(ls('bs_groq_key',''));
  const [page,setPage]=useState('dashboard');
  const [tasks,setTasks]=useState(ls('bs_tasks',[]));
  const [timerSecs,setTimerSecs]=useState(0);
  const [timerRunning,setTimerRunning]=useState(false);
  const timerRef=useRef(null);
  const dailyRef=useRef(ls('bs_daily_times',{}));

  // Determine initial screen — check Supabase session first
  useEffect(()=>{
    const init=async()=>{
      if(supabase){
        // Check for existing Supabase session
        const {data:{session}}=await supabase.auth.getSession();
        if(session?.user){
          const name=session.user.user_metadata?.name||session.user.email.split('@')[0];
          const u={name,email:session.user.email,id:session.user.id};
          setUser(u);
          ss('bs_current_user',u);
          const savedProfile=ls('bs_profile',null);
          if(!savedProfile)setScreen('apikey'); else setScreen('app');
          return;
        }
        // Listen for auth state changes
        supabase.auth.onAuthStateChange((_event,session)=>{
          if(!session){setUser(null);setScreen('landing');}
        });
      }
      // localStorage fallback
      if(user){
        if(!profile)setScreen('profile'); else setScreen('app');
      }else{setScreen('landing');}
    };
    init();
  },[]);

  // Timer logic
  useEffect(()=>{
    if(screen==='app'){
      setTimerRunning(true);
      const todayKey=today();
      const base=ls('bs_daily_times',{})[todayKey]||0;
      setTimerSecs(base);
    }
  },[screen]);

  useEffect(()=>{
    if(timerRunning){
      timerRef.current=setInterval(()=>{
        setTimerSecs(s=>{
          const next=s+1;
          // Save every 10 seconds
          if(next%10===0){
            const dt=ls('bs_daily_times',{});
            dt[today()]=next;
            ss('bs_daily_times',dt);
            // update streak
            const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
            const yk=yesterday.toISOString().split('T')[0];
            const s2=ls('bs_streak',0);
            if(dt[yk]){ss('bs_streak',s2+1);}
          }
          return next;
        });
      },1000);
    }else{clearInterval(timerRef.current);}
    return()=>clearInterval(timerRef.current);
  },[timerRunning]);

  const onAuthDone=(u)=>{setUser(u);setScreen(profile?'app':'apikey');};
  const onApiKeyDone=(k)=>{if(k){setApiKey(k);ss('bs_groq_key',k);}setScreen(profile?'app':'profile');};
  const onProfileDone=(p)=>{setProfile(p);setScreen('app');};
  const onLogout=async()=>{
    if(supabase) await supabase.auth.signOut();
    ss('bs_current_user',null);
    setUser(null);setProfile(null);setScreen('landing');
  };

  if(screen==='landing')return <LandingPage onAuth={m=>{setAuthMode(m);setScreen('auth');}}/>;
  if(screen==='auth')return <AuthPage mode={authMode} onDone={onAuthDone} onSwitch={()=>setAuthMode(m=>m==='login'?'signup':'login')}/>;
  if(screen==='apikey')return <ApiKeySetup onDone={onApiKeyDone}/>;
  if(screen==='profile')return <ProfileSetup user={user} onDone={onProfileDone}/>;

  const renderPage=()=>{
    switch(page){
      case 'dashboard':return <Dashboard user={user} profile={profile} timerSecs={timerSecs} tasks={tasks} setPage={setPage}/>;
      case 'routine':return <StudyRoutine profile={profile} apiKey={apiKey}/>;
      case 'tasks':return <TaskManager tasks={tasks} setTasks={setTasks} profile={profile}/>;
      case 'videos':return <StudyVideos tasks={tasks} setTasks={setTasks}/>;
      case 'topics':return <ImportantTopics profile={profile}/>;
      case 'notes':return <NotesSection/>;
      case 'books':return <BooksLibrary/>;
      case 'jobs':return <JobFinder/>;
      case 'alerts':return <GovtAlerts/>;
      case 'performance':return <PerformanceDashboard tasks={tasks} timerSecs={timerSecs}/>;
      case 'settings':return <Settings apiKey={apiKey} setApiKey={setApiKey} user={user} onLogout={onLogout} setPage={setPage}/>;
      default:return <Dashboard user={user} profile={profile} timerSecs={timerSecs} tasks={tasks} setPage={setPage}/>;
    }
  };

  return(
    <div style={{display:'flex',minHeight:'100vh',background:'linear-gradient(135deg,#0f0c29,#1a1535,#0f0c29)'}}>
      <Sidebar page={page} setPage={setPage} user={user}/>
      <div className="main-wrap" style={{marginLeft:220,flex:1,padding:'32px 36px',maxWidth:'calc(100vw - 220px)',overflowX:'hidden'}}>
        {renderPage()}
      </div>
      <FloatingTimer seconds={timerSecs} running={timerRunning} onToggle={()=>setTimerRunning(r=>!r)}/>
    </div>
  );
}

// Load Supabase via dynamic import, then render the app
(async()=>{
  if(SUPABASE_URL !== 'YOUR_SUPABASE_URL'){
    try{
      const {createClient} = await import('https://esm.sh/@supabase/supabase-js@2');
      supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth:{autoRefreshToken:true, persistSession:true, detectSessionInUrl:true}
      });
      console.log('✅ Supabase ready');
    }catch(e){
      supabaseError = e.message;
      console.error('❌ Supabase init failed:',e.message);
    }
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
})();
</script>
